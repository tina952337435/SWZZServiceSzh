# --- HikariCP 核心连接池配置 ---
# 连接池最大连接数（建议根据并发量适当调大，比如 20-50）
spring.datasource.swzzmode.hikari.maximum-pool-size=20
# 最小空闲连接数（保持一定的热连接，避免频繁创建销毁）
spring.datasource.swzzmode.hikari.minimum-idle=5
# 获取连接的超时时间（毫秒），保持默认的30秒即可
spring.datasource.swzzmode.hikari.connection-timeout=30000
# 连接在池中的最大存活时间（毫秒），建议比数据库的 wait_timeout 小几分钟
spring.datasource.swzzmode.hikari.max-lifetime=1800000
# 空闲连接超时时间（毫秒），超过这个时间的空闲连接会被回收
spring.datasource.swzzmode.hikari.idle-timeout=600000
# 测试连接有效性的 SQL（达梦数据库通常兼容 SELECT 1）
spring.datasource.swzzmode.hikari.connection-test-query=SELECT 1
# 连接泄漏检测阈值（毫秒），生产环境排查问题时非常有用
spring.datasource.swzzmode.hikari.leak-detection-threshold=60000
